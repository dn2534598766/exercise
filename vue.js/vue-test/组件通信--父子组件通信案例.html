<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组件通信--父子组件通信案例</title>
</head>
<body>
  <div id="app">
    <cpn :cnumber1="num1" @changeValue="receive"></cpn>
  </div>

  <template id="cpn">
    <div>
      <h2>子组件{{cnumber1}}</h2>
      <input type="text" :value="cnumber1" @input="change">
      
    </div>
  </template>
  <script src="../lib/vue.js"></script>
  <script>
    const app = new Vue({
      el:'#app',
      data:{
        num1:100,
        num2:200
      },
      components:{
        'cpn':{
          template:'#cpn',
          props:{
            cnumber1:Number,
            cnumber2:Number
          },
          data(){
          return {
              number1:this.cnumber1,
              number2:this.cnumber2
            }
          },
          methods:{
            change(event){
              this.number1=event.target.value
              this.$emmit('changeValue',this.number1)
            }
          }
        },
        methods:{
          receive(value){
            this.num1=value
          }
        }
      }
    })
  </script>
</body>
</html>
